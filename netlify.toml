[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect www → apex
[[redirects]]
  from   = "https://www.formigalwines.com/*"
  to     = "https://formigalwines.com/:splat"
  status = 301
  force  = true

# 404 fallback
[[redirects]]
  from   = "/*"
  to     = "/404"
  status = 404
